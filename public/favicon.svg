<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Globe circle -->
  <circle cx="32" cy="32" r="28" stroke="#4488ff" stroke-width="2.5" fill="#1a1a2e"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="#4488ff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="32" cy="32" rx="28" ry="20" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <!-- Longitude lines -->
  <ellipse cx="32" cy="32" rx="10" ry="28" stroke="#4488ff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="32" cy="32" rx="20" ry="28" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <!-- Center vertical line -->
  <line x1="32" y1="4" x2="32" y2="60" stroke="#4488ff" stroke-width="1" opacity="0.3"/>
  <!-- Center horizontal line -->
  <line x1="4" y1="32" x2="60" y2="32" stroke="#4488ff" stroke-width="1" opacity="0.3"/>
  <!-- Data spike accents -->
  <circle cx="22" cy="20" r="2" fill="#00e676"/>
  <circle cx="40" cy="26" r="3" fill="#ff9800"/>
  <circle cx="36" cy="40" r="2.5" fill="#f44336"/>
  <circle cx="24" cy="38" r="1.5" fill="#ffeb3b"/>
</svg>
